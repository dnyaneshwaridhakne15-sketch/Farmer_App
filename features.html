<h1 id="title">Farmer Marketing App</h1>

<!-- Language -->
<select id="language" onchange="changeLanguage()">
  <option value="en">English</option>
  <option value="hi">Hindi</option>
  <option value="mr">Marathi</option>
</select>

<br><br>

<!-- Add Crop -->
<input type="text" id="cropName" placeholder="Enter crop name">
<input type="number" id="cropPrice" placeholder="Enter price">
<button onclick="addCrop()" id="addBtn">Add Crop</button>

<br><br>

<!-- Search -->
<input type="text" id="search" placeholder="Search crop" onkeyup="searchCrop()">

<!-- Crop List -->
<div id="cropList"></div>

<script>
  var crops = [];

  // 🌐 Language data
  var text = {
    en: {
      title: "Farmer Marketing App",
      name: "Enter crop name",
      price: "Enter price",
      add: "Add Crop",
      search: "Search crop"
    },
    hi: {
      title: "किसान मार्केटिंग ऐप",
      name: "फसल का नाम दर्ज करें",
      price: "कीमत दर्ज करें",
      add: "फसल जोड़ें",
      search: "फसल खोजें"
    },
    mr: {
      title: "शेतकरी मार्केटिंग अॅप",
      name: "पीकाचे नाव टाका",
      price: "किंमत टाका",
      add: "पीक जोडा",
      search: "पीक शोधा"
    }
  };

  function changeLanguage() {
    var lang = document.getElementById("language").value;

    document.getElementById("title").innerText = text[lang].title;
    document.getElementById("cropName").placeholder = text[lang].name;
    document.getElementById("cropPrice").placeholder = text[lang].price;
    document.getElementById("addBtn").innerText = text[lang].add;
    document.getElementById("search").placeholder = text[lang].search;
  }

  // ➕ Add Crop
  function addCrop() {
    var name = document.getElementById("cropName").value;
    var price = document.getElementById("cropPrice").value;

    if(name && price){
      crops.push({name: name, price: price});
      displayCrops();
      document.getElementById("cropName").value = "";
      document.getElementById("cropPrice").value = "";
    } else {
      alert("Enter name and price");
    }
  }

  // 📋 Display Crops
  function displayCrops() {
    var list = document.getElementById("cropList");
    list.innerHTML = "";

    crops.forEach(function(crop, index){
      var div = document.createElement("div");
      div.className = "crop";

      div.innerHTML = crop.name + " - ₹" + crop.price +
        " <button onclick='deleteCrop("+index+")'>Delete</button>";

      list.appendChild(div);
    });
  }

  // ❌ Delete Crop
  function deleteCrop(index){
    crops.splice(index,1);
    displayCrops();
  }

  // 🔍 Search Crop
  function searchCrop(){
    var value = document.getElementById("search").value.toLowerCase();
    var items = document.getElementById("cropList").children;

    for(var i=0;i<items.length;i++){
      var text = items[i].innerText.toLowerCase();
      items[i].style.display = text.includes(value) ? "block" : "none";
    }
  }

  // Default language
  changeLanguage();
</script>
