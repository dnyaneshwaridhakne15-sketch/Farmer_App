<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pest AI Scanner</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0; padding: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      background: #f9f9f9;
      height: 100vh;
    }
    header {
      width: 100%;
      background: #4CAF50;
      color: white;
      text-align: center;
      padding: 15px 0;
      font-size: 20px;
    }
    #camera {
      width: 90%;
      max-width: 400px;
      margin: 20px auto;
      border: 2px solid #ddd;
      border-radius: 10px;
    }
    button {
      background: #4CAF50;
      color: white;
      border: none;
      padding: 10px 20px;
      font-size: 18px;
      border-radius: 5px;
      margin: 10px;
      cursor: pointer;
    }
    button:disabled {
      background: #aaa;
      cursor: not-allowed;
    }
    #result {
      margin-top: 15px;
      font-size: 18px;
      color: #333;
      text-align: center;
    }
  </style>
</head>
<body>
  <header>Pest AI Scanner</header>
  
  <video id="camera" autoplay playsinline></video>
  <button id="captureBtn">Scan Pest</button>
  <div id="result">Result will appear here</div>

  <script>
    const video = document.getElementById('camera');
    const captureBtn = document.getElementById('captureBtn');
    const resultDiv = document.getElementById('result');

    // Mobile camera access
    async function initCamera() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
        video.srcObject = stream;
      } catch (err) {
        resultDiv.innerText = "Camera access denied or not supported.";
        captureBtn.disabled = true;
      }
    }

    initCamera();

    // Demo AI scanner logic
    captureBtn.addEventListener('click', () => {
      // Here you can integrate real AI model or API
      // For demo, random result
      const pests = ["Aphid", "Whitefly", "Locust", "No pest detected"];
      const randomPest = pests[Math.floor(Math.random() * pests.length)];
      resultDiv.innerText = `Detected: ${randomPest}`;
    });
  </script>
</body>
</html>
