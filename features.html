<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8"> <!-- ✅ IMPORTANT FIX -->

  <title>Farmer Marketing App</title>
\<style>
  body {
    font-family: Arial, "Noto Sans Devanagari", sans-serif;
    text-align: center;
    background: linear-gradient(to right, #e8f5e9, #c8e6c9);
  }
  
  table {
    margin: auto;
    border-collapse: collapse;
    width: 90%;
    background: white;
    border-radius: 10px;
    overflow: hidden;
  }
  
  th {
    background: green;
    color: white;
  }
  
  td {
    background: #f9f9f9;
  }
  
  button {
    padding: 10px 20px;
    margin-top: 15px;
    border: none;
    background: green;
    color: white;
    border-radius: 8px;
    font-size: 16px;
  }
</style>
</head>

<body>

<h2 id="title">Farmer Marketing App</h2>


<h2>Choose Language</h2>
  <button onclick="setLang('en')">English</button>
  <button onclick="setLang('mr')">मराठी</button>
  <button onclick="setLang('hi')">हिंदी</button>


<div class="container">
  <button id="market" onclick="goToPage()">Live Market Price</button>
  <button id="chat" onclick="goToChat()">Farmer Communication</button>
  <button id="pest" onclick="goToPest()">Pest & Disease Scanner</button>
  
  <button id="expense" onclick="goToExpense()">Expense Tracker</button>
  <button id="crop" onclick="goToCrop()">Crop Information</button>
</div>



<script>

const data = {
  en: {
    title: "Farmer Marketing App",
    market: "Live Market Price",
    chat: "Farmer Communication",
    pest: "Pest & Disease Scanner",
    expense: "Expense Tracker",
    crop: "Crop Information"
  },
  mr: {
    title: "शेतकरी मार्केटिंग अ‍ॅप",
    market: "लाईव्ह बाजार भाव",
    chat: "शेतकरी संवाद",
    pest: "किड व रोग स्कॅनर",
    expense: "खर्च ट्रॅकर",
    crop: "पिक माहिती"
  },
  hi: {
    title: "किसान मार्केटिंग ऐप",
    market: "लाइव बाजार भाव",
    chat: "किसान संवाद",
    pest: "कीट और रोग स्कैनर",
    expense: "खर्च ट्रैकर",
    crop: "फसल जानकारी"
  }
};

function setLang(lang) {
  localStorage.setItem("language", lang);
  document.getElementById("title").textContent = data[lang].title;
  document.getElementById("market").textContent = data[lang].market;
  document.getElementById("chat").textContent = data[lang].chat;
  document.getElementById("pest").textContent = data[lang].pest;
  document.getElementById("expense").textContent = data[lang].expense;
  document.getElementById("crop").textContent = data[lang].crop;
}

window.onload = function() {
  const savedLang = localStorage.getItem("language") || "en";
  setLang(savedLang);
};
  

/* Navigation */
function goToPage() {
  window.location.href = "live-price.html";
}
function goToChat() {
  window.location.href = "chat.html";
}
function goToPest() {
  window.location.href = "pest.html";
}
function goToExpense() {
  window.location.href = "expense.html";
}
function goToCrop() {
  window.location.href = "crop.html";
}
</script>

</body>
</html>
