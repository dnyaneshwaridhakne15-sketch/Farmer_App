<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Expense Tracker</title>

<style>
body {
  font-family: Arial;
  background: #e8f5e9;
  text-align: center;
}

input, button {
  width: 90%;
  padding: 10px;
  margin: 5px;
  border-radius: 8px;
}

button {
  background: green;
  color: white;
  border: none;
}

li {
  background: #c8e6c9;
  margin: 5px;
  padding: 10px;
  border-radius: 8px;
}
</style>
</head>

<body>

<h2 id="title"></h2>

<input type="text" id="name">
<input type="text" id="amount"> <!-- IMPORTANT: text type -->

<button onclick="addExpense()" id="addBtn"></button>

<ul id="list"></ul>

<h3 id="total"></h3>

<button onclick="goBack()" id="backBtn"></button>

<script>

let expenses = [];

// 🌐 Language data
const langData = {
  en: {
    title: "Expense Tracker",
    name: "Enter item name",
    amount: "Enter amount (e.g. 100+200)",
    add: "Add",
    total: "Total",
    back: "Back",
    alert1: "Enter item name",
    alert2: "Enter valid amount"
  },
  mr: {
    title: "खर्च ट्रॅकर",
    name: "आयटम नाव टाका",
    amount: "रक्कम टाका (उदा. 100+200)",
    add: "जोडा",
    total: "एकूण",
    back: "मागे जा",
    alert1: "आयटम नाव टाका",
    alert2: "योग्य रक्कम टाका"
  },
  hi: {
    title: "खर्च ट्रैकर",
    name: "आइटम नाम दर्ज करें",
    amount: "राशि दर्ज करें (जैसे 100+200)",
    add: "जोड़ें",
    total: "कुल",
    back: "वापस जाएं",
    alert1: "आइटम नाम दर्ज करें",
    alert2: "मान्य राशि दर्ज करें"
  }
};

// 🔥 language fix
let currentLang = localStorage.getItem("language") || "en";

// UI update
function updateUI() {
  let t = langData[currentLang];

  document.getElementById("title").innerText = t.title;
  document.getElementById("name").placeholder = t.name;
  document.getElementById("amount").placeholder = t.amount;
  document.getElementById("addBtn").innerText = t.add;
  document.getElementById("backBtn").innerText = t.back;

  displayExpenses();
}

// 🔥 SAFE CALCULATION
function calculateAmount(input) {
  if (!/^[0-9+ ]+$/.test(input)) return NaN;

  let parts = input.split("+");
  let total = 0;

  for (let i = 0; i < parts.length; i++) {
    let num = Number(parts[i].trim());
    if (isNaN(num)) return NaN;
    total += num;
  }

  return total;
}

// ➕ Add
function addExpense() {
  let t = langData[currentLang];

  let name = document.getElementById("name").value.trim();
  let input = document.getElementById("amount").value.trim();

  if (name === "") {
    alert(t.alert1);
    return;
  }

  if (input === "") {
    alert(t.alert2);
    return;
  }

  let amount = calculateAmount(input);

  if (isNaN(amount) || amount <= 0) {
    alert(t.alert2);
    return;
  }

  expenses.push({name, amount});

  document.getElementById("name").value = "";
  document.getElementById("amount").value = "";

  displayExpenses();
}

// 📋 Display
function displayExpenses() {
  let t = langData[currentLang];

  let list = document.getElementById("list");
  list.innerHTML = "";

  let total = 0;

  expenses.forEach(item => {
    let li = document.createElement("li");
    li.innerText = item.name + " : ₹" + item.amount;
    list.appendChild(li);

    total += item.amount;
  });

  document.getElementById("total").innerText =
    t.total + ": ₹" + total;
}

// 🔙 Back
function goBack() {
  window.location.href = "features.html";
}

// INIT
updateUI();

</script>

</body>
</html>
