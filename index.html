<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      background: #e8f5e9;
      text-align: center;
      padding: 40px;
    }

    input, button {
      width: 90%;
      padding: 12px;
      margin: 8px;
      border-radius: 8px;
    }

    button {
      background: green;
      color: white;
      border: none;
    }
  </style>
</head>

<body>

<h2>Farmer App Login</h2>

<input type="email" id="email" placeholder="Enter Email">
<input type="password" id="password" placeholder="Enter Password">

<button id="loginBtn">Login</button>
<button id="signupBtn">Create Account</button>

<!-- ✅ USE COMPAT VERSION (VERY IMPORTANT) -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<script>
  // 👉 PUT YOUR REAL FIREBASE CONFIG HERE
  const firebaseConfig = {
    apiKey: "AIzaSyCxnZ88ixV9Oi3-laN8T-DKiSc3IegNZ3s",
  authDomain: "farmerapp-e098a.firebaseapp.com",
  projectId: "farmerapp-e098a"
  };

  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();

  // ✅ LOGIN BUTTON
  document.getElementById("loginBtn").addEventListener("click", function () {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    auth.signInWithEmailAndPassword(email, password)
      .then(() => {
        alert("Login Success ✅");
        window.location.href = "features.html";
      })
      .catch((error) => {
        alert(error.message);
      });
  });

  // ✅ SIGNUP BUTTON
  document.getElementById("signupBtn").addEventListener("click", function () {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    auth.createUserWithEmailAndPassword(email, password)
      .then(() => {
        alert("Account Created ✅");
      })
      .catch((error) => {
        alert(error.message);
      });
  });
</script>

</body>
</html>
