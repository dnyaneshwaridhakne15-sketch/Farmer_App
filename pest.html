<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>Pest AI Scanner</title>
  
  <style>
    body {
      font-family: Arial, "Noto Sans Devanagari", sans-serif;
      background: #e8f5e9;
      text-align: center;
    }
    
    button {
      padding: 10px;
      margin: 10px;
      border: none;
      background: green;
      color: white;
      border-radius: 8px;
    }
    
    #result {
      margin-top: 20px;
      white-space: pre-wrap;
      background: #c8e6c9;
      padding: 15px;
      border-radius: 10px;
      display: none;
    }
  </style>
</head>

<body>
  
  <button onclick="goBack()" id="backBtn">Back</button>
  
  <h2 id="title">🌿 Pest & Disease Scanner</h2>
  
  <label id="fileLabel">Choose File</label><br>
  <input type="file" id="fileInput"><br>
  
  <button onclick="scanImage()" id="scanBtn">Scan</button>
  
  <div id="result"></div>
  
  <script>
    // 🌐 UI Language Data
    const uiLang = {
      en: {
        title: "🌿 Pest & Disease Scanner",
        scan: "Scan",
        back: "Back",
        choose: "Choose File"
      },
      mr: {
        title: "🌿 किड व रोग स्कॅनर",
        scan: "स्कॅन करा",
        back: "मागे जा",
        choose: "फाइल निवडा"
      },
      hi: {
        title: "🌿 कीट और रोग स्कैनर",
        scan: "स्कैन करें",
        back: "वापस जाएं",
        choose: "फ़ाइल चुनें"
      }
    };
    
    // 🌐 Load language
    let currentLang;
    
    window.onload = function() {
      currentLang = localStorage.getItem("language") || "en";
      updateUI();
    };
    
    // 🔄 Update UI text
    function updateUI() {
      const t = uiLang[currentLang];
      
      document.getElementById("title").innerText = t.title;
      document.getElementById("scanBtn").innerText = t.scan;
      document.getElementById("backBtn").innerText = t.back;
      document.getElementById("fileLabel").innerText = t.choose;
    }
    
    // 🔙 Back button
    function goBack() {
      window.location.href = "features.html";
    }
    
    // 🤖 Fake AI Scan
    function scanImage() {
      const file = document.getElementById("fileInput").files[0];
      const result = document.getElementById("result");
      
      if (!file) {
        result.style.display = "block";
        result.innerText = "Please select image";
        return;
      }
      
      result.style.display = "block";
      result.innerText = "🔄 AI is analyzing image...";
      
       setTimeout(() => {
  
  let output = "";
  
  if (currentLang === "mr") {
    output = `
🌿 रोग: पानांवरील डाग (Leaf Spot)

🔍 लक्षणे:
- पानांवर पिवळे किंवा तपकिरी डाग दिसतात
- पानं सुकायला लागतात
- पानांवर छिद्रे पडू शकतात
- झाडाची वाढ मंदावते

🦠 कारणे:
- बुरशीजन्य संसर्ग
- जास्त ओलावा
- हवेत आर्द्रता जास्त असणे

💊 उपाय:
- Mancozeb / Carbendazim फवारणी करा
- 7-10 दिवसांनी पुन्हा फवारणी करा
- संक्रमित पानं लगेच काढून टाका

🛡️ प्रतिबंध:
- जास्त पाणी देऊ नका
- झाडांमध्ये योग्य अंतर ठेवा
- शेत स्वच्छ ठेवा

🌱 अतिरिक्त माहिती:
हा रोग प्रामुख्याने पावसाळ्यात वाढतो.
वेळेवर उपचार न केल्यास उत्पादन कमी होऊ शकते.
    `;
  }
  
  else if (currentLang === "hi") {
    output = `
🌿 रोग: पत्ती धब्बा (Leaf Spot)

🔍 लक्षण:
- पत्तियों पर पीले/भूरे धब्बे
- पत्ते सूखने लगते हैं
- पत्तियों में छेद हो सकते हैं
- पौधे की वृद्धि रुक जाती है

🦠 कारण:
- फंगल संक्रमण
- अधिक नमी
- गीला वातावरण

💊 समाधान:
- Mancozeb / Carbendazim का छिड़काव करें
- 7-10 दिन बाद दोहराएं
- संक्रमित पत्तियां हटा दें

🛡️ बचाव:
- अधिक पानी न दें
- पौधों के बीच दूरी रखें
- खेत साफ रखें

🌱 अतिरिक्त जानकारी:
यह रोग बरसात में तेजी से फैलता है।
समय पर उपचार जरूरी है।
    `;
  }
  
  else {
    output = `
🌿 Disease: Leaf Spot

🔍 Symptoms:
- Yellow or brown spots on leaves
- Leaves start drying
- Holes may appear on leaves
- Plant growth slows down

🦠 Causes:
- Fungal infection
- High moisture
- Humid conditions

💊 Treatment:
- Spray Mancozeb / Carbendazim
- Repeat after 7–10 days
- Remove infected leaves

🛡️ Prevention:
- Avoid overwatering
- Maintain proper spacing
- Keep field clean

🌱 Extra Info:
This disease spreads quickly during rainy season.
Timely treatment is important to avoid crop loss.
    `;
  }
  
  result.innerText = output;
  
}, 2000);
    }
  </script>
  
</body>

</html>
