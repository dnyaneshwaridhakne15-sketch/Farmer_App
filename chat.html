<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title id="title">Farmers Communication</title>

  <style>
    body {
      font-family: Arial, "Noto Sans Devanagari", sans-serif;
      background: #f5f5f5;
      text-align: center;
    }

    #chatBox {
      width: 90%;
      max-width: 400px;
      height: 300px;
      margin: 20px auto;
      border: 1px solid #ccc;
      background: white;
      overflow-y: auto;
      padding: 10px;
      text-align: left; /* 🔥 LEFT ALIGN */
    }

    .message {
      background: #d1f0d1;
      padding: 8px 12px;
      margin: 5px 0;
      border-radius: 10px;
      width: fit-content;
      max-width: 80%;
    }

    input {
      padding: 10px;
      width: 65%;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    button {
      padding: 10px 15px;
      border: none;
      background: green;
      color: white;
      border-radius: 5px;
      margin-top: 10px;
    }

    #backBtn {
      background: gray;
      margin-top: 15px;
    }
  </style>
</head>

<body>

<h2 id="heading">Farmers Communication</h2>

<div id="chatBox"></div>

<input type="text" id="inputMsg" placeholder="Enter message">
<br>

<button onclick="sendMessage()" id="sendBtn">Send</button>

<br>

<button onclick="goBack()" id="backBtn">Back</button>

<script>

// ✅ Language
function getLang() {
  let lang = localStorage.getItem("language");
  if (lang !== "mr" && lang !== "hi") return "en";
  return lang;
}

// ✅ Apply language
function applyLanguage() {
  let lang = getLang();

  if (lang === "mr") {
    document.getElementById("heading").innerText = "शेतकरी संवाद";
    document.getElementById("inputMsg").placeholder = "संदेश लिहा...";
    document.getElementById("sendBtn").innerText = "पाठवा";
    document.getElementById("backBtn").innerText = "मागे जा";
  } 
  else if (lang === "hi") {
    document.getElementById("heading").innerText = "किसान संवाद";
    document.getElementById("inputMsg").placeholder = "संदेश लिखें...";
    document.getElementById("sendBtn").innerText = "भेजें";
    document.getElementById("backBtn").innerText = "वापस जाएं";
  }
}

// ✅ Send message (LEFT aligned)
function sendMessage() {
  let input = document.getElementById("inputMsg");
  let msg = input.value;

  if (msg === "") return;

  let box = document.getElementById("chatBox");

  box.innerHTML += `<div class="message">${msg}</div>`; // 🔥 styled message

  input.value = "";

  box.scrollTop = box.scrollHeight; // auto scroll
}

// 🔙 Back
function goBack() {
  window.location.href = "features.html";
}

// 🚀 Start
window.onload = applyLanguage;

</script>

</body>
</html>
