<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Crop Info</title>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #f1f8e9;
    }

    h2 { color: green; }

    select, button {
      padding: 10px;
      margin: 10px;
      width: 220px;
    }

    #result {
      margin-top: 20px;
      font-size: 18px;
    }

    #backBtn {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: green;
      color: white;
      border: none;
      border-radius: 5px;
    }
  </style>
</head>

<body>

<h2 id="title">Select Crop</h2>

<select id="cropSelect"></select>

<br>

<button id="searchBtn">Get Info</button>

<p id="result"></p>

<button id="backBtn">Back</button>

<script>

// 🔥 Firebase config (तुझा टाक)
const firebaseConfig = {
   apiKey: "AIzaSyCxnZ88ixV9Oi3-laN8T-DKiSc3IegNZ3s",
   authDomain: "farmerapp-e098a.firebaseapp.com",
   databaseURL: "https://farmerapp-e098a-default-rtdb.firebaseio.com",
   projectId: "farmerapp-e098a",
   storageBucket: "farmerapp-e098a.firebasestorage.app",
   messagingSenderId: "42230324667",
   appId: "1:42230324667:web:28d02ffab67bac2611f89e",
   measurementId: "G-1KRYMYHJGH"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();


// 🔥 PAGE LOAD
window.onload = function () {

  let lang = localStorage.getItem("language") || "en";

  const text = {
    en: {
      title: "Select Crop",
      button: "Get Info",
      back: "Back",
      select: "Select Crop"
    },
    mr: {
      title: "पीक निवडा",
      button: "माहिती पहा",
      back: "मागे जा",
      select: "पीक निवडा"
    },
    hi: {
      title: "फसल चुनें",
      button: "जानकारी देखें",
      back: "वापस जाएँ",
      select: "फसल चुनें"
    }
  };

  // UI text
  document.getElementById("title").innerText = text[lang].title;
  document.getElementById("searchBtn").innerText = text[lang].button;
  document.getElementById("backBtn").innerText = text[lang].back;

  // 🔥 LOAD CROPS FROM FIREBASE
  const dropdown = document.getElementById("cropSelect");
  dropdown.innerHTML = `<option>${text[lang].select}</option>`;

  db.collection("Crops").get().then(snapshot => {
    snapshot.forEach(doc => {
      let data = doc.data();

      let name = "";

      if (lang === "mr") {
        name = data.cropName_mr;
      } else if (lang === "hi") {
        name = data.cropName_hi;
      } else {
        name = data.cropName_en;
      }

      dropdown.innerHTML += `<option value="${doc.id}">${name}</option>`;
    });
  });

};


// 🔥 BUTTON CLICK
document.getElementById("searchBtn").onclick = function () {

  let crop = document.getElementById("cropSelect").value;
  let lang = localStorage.getItem("language") || "en";

  if (crop === "Select Crop" || crop === "पीक निवडा" || crop === "फसल चुनें") {
    alert("Please select crop");
    return;
  }

  db.collection("Crops").doc(crop).get().then(doc => {

    if (doc.exists) {
      let data = doc.data();

      let info = "";

      if (lang === "mr") {
        info = data.info_mr;
      } else if (lang === "hi") {
        info = data.info_hi;
      } else {
        info = data.info_en;
      }

      document.getElementById("result").innerText = info;

    } else {
      document.getElementById("result").innerText = "No data found";
    }

  });

};


// 🔙 BACK
document.getElementById("backBtn").onclick = function () {
  window.location.href = "features.html";
};

</script>

</body>
</html>
